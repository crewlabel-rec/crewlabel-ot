<title>크루레이블 OT 큐카드 — 오프닝</title>
<style>
  @font-face {
    font-family: 'GmarketSans';

    font-display: swap;
  }
  @font-face {
    font-family: 'GmarketSans';
    src: url('https://crewlabel-rec.github.io/font/GMARKETSANSTTFBOLD.TTF') format('truetype');

    font-display: swap;

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1c1c1e;
    font-family: 'GmarketSans', -apple-system, sans-serif;
  }

  .stage {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3.5vh 6vw 0;
    flex-shrink: 0;
  }

  .card-label {
    font-size: 26px;
    font-weight: 600;
    color: #c9c9cd;
    letter-spacing: 0.02em;
  }

  .dots {
    display: flex;
    gap: 9px;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #444448;
    transition: background 0.2s;
  }
  .dot.active { background: #f5f5f0; }

  .main {
    flex: 1;
    overflow-y: auto;
    padding: 2.5vh 6vw 3vh;
    display: flex;
    flex-direction: column;
  }

  .main-inner {
    margin: auto 0;
  }

  .section + .section {
    margin-top: 40px;
    padding-top: 32px;
    border-top: 1px solid #2c2c2e;
  }

  .title-text {
    font-size: 30px;
    font-weight: 700;
    line-height: 1.5;
    color: #f5f5f0;
    margin-bottom: 18px;
  }

  .script-body {
    font-size: 25px;
    line-height: 1.85;
    color: #c9c9cd;
    font-weight: 500;
    white-space: pre-line;
  }

  .qline {
    color: #f2b866;
  }

  .stagecue {
    color: #a8f0d0;
    font-style: italic;
    font-weight: 600;
  }

  .pronounce {
    color: #ff2d3a;
    font-weight: 700;
  }

  .kakao-card {
    background: #2a2a2d;
    border-radius: 10px;
    padding: 12px 14px;
    margin: 0;
    font-size: 22px;
    color: #e8e8ea;
    line-height: 1.6;
  }

  .choice-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin: 0;
  }

  .choice-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    background: #232326;
    border: 0.5px solid #38383c;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 20px;
    color: #c9c9cd;
    line-height: 1.5;
  }

  .choice-num {
    color: #a8f0d0;
    font-weight: 700;
    min-width: 18px;
  }

  .note-box {
    background: rgba(196,138,90,0.12);
    border-left: 3px solid #d9a679;
    border-radius: 0 8px 8px 0;
    padding: 10px 14px;
    margin: 0;

  .note-label {
    font-size: 13px;
    color: #d9a679;
    font-weight: 600;
    margin-bottom: 2px;

  .agenda-label {
    font-size: 22px;
    color: #f2b866;
    font-weight: 700;
    margin: 0;

  .note-body {
    font-size: 18px;
    color: #c9b699;
    line-height: 1.5;

  .highlight {
    color: #f5f5f0;
    font-weight: 700;
  }

  .top-row-left {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .part-label {
    font-size: 30px;
    font-weight: 700;
    color: #a8f0d0;
    letter-spacing: 0.01em;
  }

  .top-sep {
    color: #444448;
    font-size: 30px;
  }

    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 14px;
    font-size: 25px;
    font-weight: 500;
    color: #c9c9cd;

  .flow-list li { display: flex; align-items: baseline; gap: 12px; }
  .flow-list .num { color: #6b6b70; font-weight: 700; min-width: 24px; }

  .mode-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 40px;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.02em;

    height: 9.5vh;

    align-items: center;

    border: none;

    font-size: 18px;
    font-weight: 500;

  #prevBtn { border-right: 1px solid #2c2c2e; }

</style>
</head>

let idx = 0;

const cardLabel = document.getElementById('cardLabel');
const partLabel = document.getElementById('partLabel');
const mainArea = document.getElementById('mainArea');
const dots = document.getElementById('dots');
const modeBar = document.getElementById('modeBar');

function render() {
  const p = pages[idx];
  cardLabel.textContent = p.label;
  partLabel.textContent = p.part;
  mainArea.scrollTop = 0;

  modeBar.className = 'mode-bar ' + p.mode;
  modeBar.textContent = p.mode === 'ppt' ? 'PPT 구간 · 뒤쪽 모니터 설명' : p.mode === 'mixed' ? '브리핑 · PPT 혼합 구간' : '브리핑 구간 · 정면 응대';

  const sectionsHtml = p.sections.map(s => {
    const body = s.flowItems
      ? '<ol class="flow-list">' + s.flowItems.map((item, i) => `<li><span class="num">${i+1}</span>${item}</li>`).join('') + '</ol>'
      : `<div class="script-body">${s.script}</div>`;
    return `<div class="section"><div class="title-text">${s.title}</div>${body}</div>`;
  }).join('');
  mainArea.innerHTML = `<div class="main-inner">${sectionsHtml}</div>`;

  dots.innerHTML = '';
  pages.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === idx ? ' active' : '');
    dots.appendChild(d);
  });
}

document.getElementById('prevBtn').addEventListener('click', () => {
  idx = (idx - 1 + pages.length) % pages.length;
  render();
});

document.getElementById('nextBtn').addEventListener('click', () => {
  idx = (idx + 1) % pages.length;
  render();
});

render();

if (window.matchMedia('(display-mode: standalone)').matches) {
  document.addEventListener('click', function fullscreenOnce() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
    }
    document.removeEventListener('click', fullscreenOnce);
  });
}
</script>
